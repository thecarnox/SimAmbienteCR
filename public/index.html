<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SimAmbienteCR</title>

    <link rel="stylesheet" href="styles/styles.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
</head>
<body>

    <!-- MENÚ -->
    <div id="menu">

        <header>
            <h1>SimAmbienteCR 🌱</h1>
            <p>Simulador ambiental interactivo de Costa Rica</p>
        </header>

        <section id="menu-content">
            <button class="btn" id="startBtn">▶ Iniciar Juego</button>
            <button class="btn" id="fullscreenBtn">⛶ Pantalla Completa</button>
            <button class="btn" id="mapBtn">🌍 Modo Mapa</button>
        </section>

        <footer>
            <p>Proyecto de Tesis - UNED</p>
            <p>Desarrollado por Erick</p>
        </footer>

    </div>

    <!-- CANVAS -->
    <canvas id="application-canvas"></canvas>

    <!-- =========================
         MAPA (MITAD IZQUIERDA)
    ========================= -->
    <div id="map"></div>

    <!-- =========================
         PANEL DERECHO (JUEGO)
    ========================= -->
    <div id="rightPanel">

        <div id="panelContent">

            <h2>🌱 Exploración Ambiental</h2>
            <p>Selecciona una región:</p>

            <button onclick="irAGuanacaste()">Guanacaste</button>
            <button onclick="irALimon()">Limón</button>
            <button onclick="irASanJose()">San José</button>
            <button id="toggleMoveBtn">🧭 Mover mapa</button>

        </div>

        <div id="panelContent">
        <h2 id="panelTitle">🌱 Exploración</h2>
        <p id="panelText">Selecciona una actividad</p>
        </div>
        

    </div>


    <!-- MENSAJE CLICK -->
    <div id="clickMessage">Tocaste el mapa 🌍</div>

    <!-- AUDIO -->
    <audio id="bgSound" loop>
        <source src="sounds/ambiente.mp3" type="audio/mp3">
    </audio>

    <!-- =========================
         SCRIPTS
    ========================= -->

    <!-- PLAYCANVAS -->
    <script src="/playcanvas/playcanvas.js"></script>

    <!-- MAIN -->
    <script src="js/main.js"></script>
    

</body>
</html>
